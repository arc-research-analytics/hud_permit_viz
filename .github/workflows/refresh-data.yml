name: Refresh permit data

# Pulls the latest BPS building-permit data from the Census Bureau, rebuilds the
# dashboard CSVs, and commits any changes back to the repo. The commit triggers
# the Heroku auto-deploy, so the live app refreshes with no manual steps.
#
# Schedule runs twice a month (19th and 26th) to absorb Census publication
# slippage; runs are idempotent, so the commit step is a no-op when nothing
# changed. The annual (benchmarked) files are fetched on every run, so the May
# benchmark release is picked up automatically the first run after it lands.

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 14 19,26 * *'  # 14:00 UTC on the 19th and 26th each month

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pipeline dependencies
        run: pip install -r backend/requirements-pipeline.txt

      - name: Fetch permit data from Census
        run: python backend/fetch_permits.py

      - name: Rebuild dashboard CSVs
        run: python backend/backend_query.py

      - name: Get current date
        id: date
        run: echo "today=$(date +'%m-%d-%Y')" >> "$GITHUB_OUTPUT"

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "new data collected ${{ steps.date.outputs.today }}"
          file_pattern: "Data/**/*.csv"

      - name: Notify Teams
        if: always()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          PROJECT: "Building Permit Tracker"
          STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set — skipping notification."
            exit 0
          fi

          STAMP=$(date -u +'%B %-d, %Y at %I:%M %p UTC')

          if [ "$STATUS" = "success" ]; then
            HEAD="✅ Run succeeded"
            COLOR="Good"
            DETAIL="The scheduled run completed successfully."
          else
            HEAD="❌ Run FAILED"
            COLOR="Attention"
            DETAIL="The scheduled run failed. Check the logs and fix before the next run."
          fi

          jq -n \
            --arg project "$PROJECT" \
            --arg head "$HEAD" \
            --arg detail "$DETAIL" \
            --arg stamp "$STAMP" \
            --arg repo "$REPO" \
            --arg url "$RUN_URL" \
            --arg color "$COLOR" \
            '{
              type: "message",
              attachments: [{
                contentType: "application/vnd.microsoft.card.adaptive",
                content: {
                  type: "AdaptiveCard",
                  version: "1.4",
                  body: [
                    { type: "TextBlock", size: "Large", weight: "Bolder", text: $project, wrap: true },
                    { type: "TextBlock", size: "Medium", weight: "Bolder", color: $color, text: $head, wrap: true },
                    { type: "TextBlock", text: $detail, wrap: true },
                    { type: "TextBlock", text: ($repo + "  •  " + $stamp), isSubtle: true, wrap: true }
                  ],
                  actions: [
                    { type: "Action.OpenUrl", title: "View run logs", url: $url }
                  ]
                }
              }]
            }' > teams-payload.json

          curl -sS --fail-with-body -H "Content-Type: application/json" \
            -d @teams-payload.json "$TEAMS_WEBHOOK_URL"
